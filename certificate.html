<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificat de Réussite - Learn Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0b0f19;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(79, 70, 229, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.15) 0%, transparent 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            flex-direction: column;
            color: #f8fafc;
        }

        .certificate-wrapper {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 850px;
            height: 600px;
            padding: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            border-radius: 16px;
        }

        .certificate-inner {
            border: 2px solid rgba(79, 70, 229, 0.3);
            border-radius: 12px;
            height: 100%;
            position: relative;
            padding: 40px;
            text-align: center;
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0) 100%);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 3px solid #6366f1;
            border-radius: 4px;
        }
        .corner-tl { top: -2px; left: -2px; border-right: none; border-bottom: none; border-top-left-radius: 12px;}
        .corner-tr { top: -2px; right: -2px; border-left: none; border-bottom: none; border-top-right-radius: 12px;}
        .corner-bl { bottom: -2px; left: -2px; border-right: none; border-top: none; border-bottom-left-radius: 12px;}
        .corner-br { bottom: -2px; right: -2px; border-left: none; border-top: none; border-bottom-right-radius: 12px;}

        .logo {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 46px;
            color: #ffffff;
            margin-bottom: 5px;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(255,255,255,0.1);
            margin-top: 0;
        }

        .subtitle {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .student-name {
            font-family: 'Playfair Display', serif;
            font-size: 44px;
            font-weight: 700;
            color: #818cf8;
            margin-bottom: 20px;
            font-style: italic;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: inline-block;
            padding: 0 40px 10px;
            text-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }

        .course-text {
            font-size: 16px;
            color: #cbd5e1;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .course-name {
            font-size: 26px;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.05);
            display: inline-block;
            padding: 10px 30px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 30px;
            margin-top: auto;
        }

        .signature {
            text-align: center;
        }

        .signature-line {
            width: 220px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 8px;
            color: #e2e8f0;
        }

        .signature-text {
            font-size: 12px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .badge {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #4f46e5 0%, #ec4899 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            box-shadow: 0 0 0 6px rgba(30, 41, 59, 1), 0 0 0 8px rgba(79, 70, 229, 0.5), 0 10px 20px rgba(0,0,0,0.5);
            position: relative;
        }
        
        .badge::after {
            content: '';
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            border: 1px dashed rgba(255,255,255,0.5);
            border-radius: 50%;
        }

        .btn-download {
            margin-top: 40px;
            padding: 14px 28px;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
            font-family: 'Outfit', sans-serif;
        }

        .btn-download:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(79, 70, 229, 0.4);
        }

        @media print {
            body { background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .certificate-wrapper { 
                background: #0b0f19; /* Force dark background on print */
                box-shadow: none; 
                margin: 0; 
                border-radius: 0;
            }
            .btn-download { display: none; }
        }
    </style>
</head>
<body>

    <div class="certificate-wrapper" id="certificate">
        <div class="certificate-inner">
            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>
            
            <div>
                <div class="logo">Learn Hub</div>
                <h1 class="title">Certificat de Réussite</h1>
                <div class="subtitle">Ce document certifie solennellement que</div>
                
                <div class="student-name" id="certStudentName">Étudiant</div>
                
                <div class="course-text">a complété avec succès et validé toutes les évaluations de la formation</div>
                <div class="course-name" id="certCourseName">Chargement du cours...</div>
            </div>
            
            <div class="footer">
                <div class="signature">
                    <div class="signature-line" style="font-family:'Outfit', sans-serif; font-weight:700; font-size:18px; padding-bottom:5px; color:#c084fc;">Plateforme Learn Hub</div>
                    <div class="signature-text">Délivré sur le site</div>
                </div>
                
                <div class="badge">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="z-index: 2;">
                        <path d="M12 15l-2 5l9-5l-9-5l2 5z"></path>
                        <circle cx="12" cy="8" r="4"></circle>
                    </svg>
                </div>
                
                <div class="signature">
                    <div class="signature-line" id="certDate" style="font-size:18px; padding-bottom:10px;">13 Juin 2026</div>
                    <div class="signature-text">Date de certification</div>
                </div>
            </div>
        </div>
    </div>

    <button class="btn-download" onclick="window.print()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        Télécharger en PDF
    </button>

    <script>
        // Récupération du nom de l'étudiant
        const name = sessionStorage.getItem('userName') || 'Étudiant Modèle';
        document.getElementById('certStudentName').textContent = name;
        
        // Récupération du nom du cours depuis l'URL dynamique (ex: ?course=Mathématiques)
        const urlParams = new URLSearchParams(window.location.search);
        const courseName = urlParams.get('course') || 'Cours Général';
        document.getElementById('certCourseName').textContent = courseName;
        
        // Date du jour dynamique
        const today = new Date();
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('certDate').textContent = today.toLocaleDateString('fr-FR', options);
    </script>
</body>
</html>
