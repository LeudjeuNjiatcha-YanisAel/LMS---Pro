services:
  - type: web
    name: lms-pro
    runtime: docker
    repo: https://github.com/LeudjeuNjiatcha-YanisAel/LMS---Pro
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_PORT
        value: "3306"
