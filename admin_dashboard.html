<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Administrateur - LMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/lms-s1.css">
</head>
<body class="dashboard-body">

    <div class="dashboard-container">
        
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon"></div>
                <h2>LMS<span>Admin</span></h2>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" id="navDashboard">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Vue d'ensemble
                </a>
                <a href="#" id="logoutBtnAdmin" class="nav-item" style="color: #ef4444; margin-top: auto;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Déconnexion
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <h1 id="pageTitle">Vue d'ensemble - Administrateur</h1>
            </header>

            <!-- Dashboard Stats -->
            <div class="stats-container" id="adminStats">
                <div class="stat-card">
                    <div class="stat-icon" style="background:rgba(99,102,241,0.2); color:var(--primary);">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>
                    </div>
                    <div class="stat-details">
                        <h3 id="statStudents">0</h3>
                        <p>Étudiants</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background:rgba(16,185,129,0.2); color:#10b981;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
                    </div>
                    <div class="stat-details">
                        <h3 id="statTeachers">0</h3>
                        <p>Professeurs</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background:rgba(236,72,153,0.2); color:#ec4899;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                    </div>
                    <div class="stat-details">
                        <h3 id="statCourses">0</h3>
                        <p>Cours Actifs</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background:rgba(245,158,11,0.2); color:#f59e0b;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    </div>
                    <div class="stat-details">
                        <h3 id="statCertsPending">0</h3>
                        <p>Certificats en attente</p>
                    </div>
                </div>
            </div>

            <div class="section-header" style="margin-top:30px;">
                <h2>Certificats à valider (En attente)</h2>
            </div>
            
            <div class="table-container">
                <table style="width:100%; border-collapse:collapse; text-align:left;">
                    <thead>
                        <tr style="border-bottom:1px solid var(--border-color); color:var(--text-muted);">
                            <th style="padding:15px;">Étudiant</th>
                            <th style="padding:15px;">Cours Validé</th>
                            <th style="padding:15px;">Date de demande</th>
                            <th style="padding:15px;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="pendingCertsList">
                        <tr>
                            <td colspan="4" style="text-align:center; padding:30px; color:var(--text-muted);">Chargement...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/admin.js"></script>
</body>
</html>
